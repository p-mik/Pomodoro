services:
  db:
    image: postgres:17
    volumes:
      - pomodoro_db:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: pomodoro
      POSTGRES_USER: pomodoro
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pomodoro"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:8001:8000"
    restart: unless-stopped

  worker:
    build: .
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    command: python manage.py procrastinate worker
    restart: unless-stopped

volumes:
  pomodoro_db:
