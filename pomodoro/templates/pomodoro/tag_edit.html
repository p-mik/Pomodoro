{% extends 'base.html' %}

{% block title %}Upravit tag — Pomodoro{% endblock %}

{% block content %}
<datalist id="tag-color-palette">
  <option value="#c0392b"></option><option value="#e67e22"></option>
  <option value="#d4a017"></option><option value="#7d6608"></option>
  <option value="#6e4b3a"></option><option value="#8e6b3e"></option>
  <option value="#f4a7a3"></option><option value="#f9c784"></option>
  <option value="#b5ead7"></option><option value="#a8d8ea"></option>
  <option value="#c3b1e1"></option><option value="#ffd6e0"></option>
  <option value="#5c8a72"></option><option value="#3b7a8c"></option>
  <option value="#5c6bc0"></option><option value="#7b5ea7"></option>
  <option value="#4a7c59"></option><option value="#6c757d"></option>
</datalist>
<div class="container py-4" style="max-width: 480px;">
  <h2 class="mb-4">Upravit tag</h2>
  <div class="card">
    <div class="card-body">
      <form method="post" class="row g-3">
        {% csrf_token %}
        <div class="col-12 d-flex gap-3 align-items-end">
          <div>
            <label class="form-label">{{ form.barva.label }}</label>
            {{ form.barva }}
          </div>
          <div class="flex-grow-1">
            <label class="form-label">{{ form.nazev.label }}</label>
            {{ form.nazev }}
            {% if form.nazev.errors %}
              <div class="invalid-feedback d-block">{{ form.nazev.errors|join:", " }}</div>
            {% endif %}
          </div>
        </div>
        <div class="col-12 d-flex gap-2">
          <button type="submit" class="btn btn-danger">Uložit</button>
          <a href="{% url 'tagy' %}" class="btn btn-outline-secondary">Zrušit</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
